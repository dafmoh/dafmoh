<style>
 body {

 .search-bar { display: flex; gap: 10px; margin: 24px 0; }
 .search-bar input {
     flex: 1;

     border-radius: 12px;
     border: 1px solid #383838;
     background-color: #202020;
     color: #ffffff;
     font-size: 16px;
 }
 .search-bar input::placeholder {

 }
 .search-bar button {

 .no-results {

     color: #cccccc;

 }
 a { color: #4ea3ff; }

<button onclick="toggleFunFact()">Show a fun fact about me</button>
<p id="fact"></p>
<script>
 let factVisible = false;
 function toggleFunFact() {
   const fact = document.getElementById("fact");
   factVisible = !factVisible;
   fact.textContent = factVisible ? "🎉 Fun fact: I dont sell games" : "";
 }
 function filterGames() {
   const search = document.getElementById('searchInput').value.toLowerCase();
   const listItems = document.querySelectorAll('ul > li');
   let matches = 0;
   listItems.forEach(item => {
     const text = item.textContent.toLowerCase();
     const isMatch = text.includes(search);
     item.style.display = isMatch ? 'block' : 'none';
     if (isMatch) matches += 1;
   });
   document.getElementById('noResults').style.display = matches === 0 ? 'block' : 'none';
 }
</script>
